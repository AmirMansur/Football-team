<!DOCTYPE html>
<html>
<head>
    <title>Football Log System</title>
    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: white;
            text-align: center;
        }

        h1 { color: #00ffcc; }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 8px 12px;
            margin: 3px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .add-btn { background: green; color: white; }
        .delete-btn { background: red; color: white; }
        .edit-btn { background: orange; }
        .download-btn { background: purple; color: white; }

        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
            width: 95%;
        }

        th, td {
            border: 1px solid white;
            padding: 8px;
        }

        th { background: #333; }
    </style>
</head>
<body>

<h1>⚽ Football Log System</h1>

<!-- PLAYER ENTRY -->
<input type="text" id="name" placeholder="Player Name">
<input type="number" id="amount" placeholder="Amount ₹">
<input type="date" id="date">
<input type="text" id="note" placeholder="Note">
<select id="status">
    <option>Paid</option>
    <option>Pending</option>
</select>

<button class="add-btn" onclick="addPlayer()">Add Player</button>

<h2>Total Collected: ₹ <span id="total">0</span></h2>

<table>
<thead>
<tr>
<th>No.</th>
<th>Name</th>
<th>Amount</th>
<th>Date</th>
<th>Status</th>
<th>Note</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="playerTable"></tbody>
</table>

<hr>

<h2>💰 Expenses</h2>

<input type="text" id="item" placeholder="Item (Ball, Net)">
<input type="number" id="cost" placeholder="Cost ₹">
<input type="date" id="expDate">

<button onclick="addExpense()">Add Expense</button>

<h3>Total Spent: ₹ <span id="spent">0</span></h3>

<table>
<thead>
<tr>
<th>No.</th>
<th>Item</th>
<th>Cost</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>

<script>
let players = JSON.parse(localStorage.getItem("players")) || [];
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function save() {
    localStorage.setItem("players", JSON.stringify(players));
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

function render() {
    let table = document.getElementById("playerTable");
    table.innerHTML = "";
    let total = 0;

    players.forEach((p, i) => {
        let row = table.insertRow();

        row.insertCell(0).innerText = i+1;
        row.insertCell(1).innerText = p.name;
        row.insertCell(2).innerText = "₹" + p.amount;
        row.insertCell(3).innerText = p.date;
        row.insertCell(4).innerText = p.status;
        row.insertCell(5).innerText = p.note;

        let action = row.insertCell(6);
        action.innerHTML = `
        <button class="edit-btn" onclick="edit(${i})">Edit</button>
        <button class="delete-btn" onclick="remove(${i})">Delete</button>
        <button class="download-btn" onclick="download(${i})">Download</button>
        `;

        if (p.status === "Paid") total += parseInt(p.amount);
    });

    document.getElementById("total").innerText = total;

    // Expenses
    let expTable = document.getElementById("expenseTable");
    expTable.innerHTML = "";
    let spent = 0;

    expenses.forEach((e, i) => {
        let row = expTable.insertRow();

        row.insertCell(0).innerText = i+1;
        row.insertCell(1).innerText = e.item;
        row.insertCell(2).innerText = "₹" + e.cost;
        row.insertCell(3).innerText = e.date;

        let action = row.insertCell(4);
        action.innerHTML = `<button class="delete-btn" onclick="deleteExp(${i})">Delete</button>`;

        spent += parseInt(e.cost);
    });

    document.getElementById("spent").innerText = spent;
}

function addPlayer() {
    let name = document.getElementById("name").value;
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;
    let note = document.getElementById("note").value;
    let status = document.getElementById("status").value;

    if (!name || !amount) return alert("Fill required fields");

    players.push({name, amount, date, note, status});
    save();
    render();
}

function remove(i) {
    players.splice(i,1);
    save();
    render();
}

function edit(i) {
    let p = players[i];
    let name = prompt("Name", p.name);
    let amount = prompt("Amount", p.amount);

    if (name && amount) {
        p.name = name;
        p.amount = amount;
    }

    save();
    render();
}

function download(i) {
    let p = players[i];
    let content = `
Player: ${p.name}
Amount: ₹${p.amount}
Date: ${p.date}
Status: ${p.status}
Note: ${p.note}
    `;

    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = p.name + ".txt";
    a.click();
}

function addExpense() {
    let item = document.getElementById("item").value;
    let cost = document.getElementById("cost").value;
    let date = document.getElementById("expDate").value;

    if (!item || !cost) return alert("Fill fields");

    expenses.push({item, cost, date});
    save();
    render();
}

function deleteExp(i) {
    expenses.splice(i,1);
    save();
    render();
}

render();
</script>

</body>
</html>
