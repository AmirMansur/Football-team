<!DOCTYPE html>
<html>
<head>
<title>Football Payment System</title>
<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
}
input {
    padding: 8px;
    margin: 5px;
}
button {
    padding: 8px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.add { background: green; color: white; }
table {
    margin: auto;
    border-collapse: collapse;
    width: 90%;
}
th, td {
    border: 1px solid white;
    padding: 8px;
}
</style>
</head>

<body>

<h1>⚽ Payment Tracker</h1>

<input id="name" placeholder="Player Name">
<input id="amount" type="number" placeholder="Amount ₹">
<input id="date" type="date">

<button class="add" onclick="add()">Add Entry</button>

<h2>Total Collection: ₹ <span id="total">0</span></h2>

<h2>👥 Player Summary</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Total Paid</th>
<th>Details</th>
</tr>
</thead>
<tbody id="summary"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function save() {
    localStorage.setItem("data", JSON.stringify(data));
}

function add() {
    let name = document.getElementById("name").value.trim();
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;

    if (!name || !amount) {
        alert("Fill all fields");
        return;
    }

    data.push({ name, amount: parseInt(amount), date });
    save();
    render();

    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
}

function render() {
    let grouped = {};
    let total = 0;

    // GROUP DATA
    data.forEach(d => {
        if (!grouped[d.name]) {
            grouped[d.name] = {
                total: 0,
                entries: []
            };
        }
        grouped[d.name].total += d.amount;
        grouped[d.name].entries.push(d);
        total += d.amount;
    });

    document.getElementById("total").innerText = total;

    let table = document.getElementById("summary");
    table.innerHTML = "";

    // SHOW GROUPED DATA
    for (let name in grouped) {
        let row = table.insertRow();

        row.insertCell(0).innerText = name;
        row.insertCell(1).innerText = "₹" + grouped[name].total;

        let details = grouped[name].entries
            .map(e => `₹${e.amount} (${e.date})`)
            .join(", ");

        row.insertCell(2).innerText = details;
    }
}

render();
</script>

</body>
</html>
